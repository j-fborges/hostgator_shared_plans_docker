version: '3.8'

services:
  app:
    image: hostgator-env
    ports:
      - "3000:3000"
    volumes:
      # Mount your host workspace folder (adjust HOST_WORKSPACE in .env if needed)
      - ${HOST_WORKSPACE:-./workspace}:${APP_ROOT}${RAILS_PROJECTS_FOLDER}:cached
      # Named volume for gems – this will persist across container runs
      - bundle-data:${APP_ROOT}/ruby/gems
      # Mount SSH keys for deployment (optional)
      - ~/.ssh:/root/.ssh:ro
    environment:
    - GEM_HOME=${APP_ROOT}/ruby/gems
    - BUNDLE_PATH=${APP_ROOT}/ruby/gems
    - BUNDLE_BIN=${APP_ROOT}/ruby/gems/bin
    # Add gem bin to PATH while keeping Ruby and system paths
    - PATH=${APP_ROOT}/ruby/gems/bin:/usr/local/ruby-2.4.10/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # Other env vars you need (RAILS_ENV, etc.)
    working_dir: ${APP_ROOT}${RAILS_PROJECTS_FOLDER}
    # Override the default command to get a bash shell (optional)
    command: bash
    # Keep stdin_open and tty for interactive use
    stdin_open: true
    tty: true
    networks:
      - hostgator-net
    depends_on:
      - mysql


  mysql:
    image: percona:5.7.23
    container_name: hostgator-mysql
    ports:
      - "3307:3306" 
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=myapp_development
      - MYSQL_USER=myapp_user
      - MYSQL_PASSWORD=myapp_password
    volumes:
      - mysql-data:/var/lib/mysql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - hostgator-net

volumes:
  bundle-data:
  mysql-data:

networks:
  hostgator-net:
    driver: bridge